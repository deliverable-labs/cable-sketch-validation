name: Trigger Main Site Rebuild

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call build hook
        env:
          WEBHOOK_URL: ${{ secrets.CABLE_SKETCH_VALIDATION_REBUILD_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "CABLE_SKETCH_VALIDATION_REBUILD_WEBHOOK secret is not set"
            exit 1
          fi
          curl -fsS -X POST -d '{}' "$WEBHOOK_URL"
